##
## LMTP specific settings
##

protocol lmtp {
  # Use full email address (user@domain) for userdb lookups.
  # Required for virtual mailbox setups where the passwd-file uses
  # full addresses as keys. The Debian default strips the domain,
  # which only works with /etc/passwd (local users).
  auth_username_format = %{user | lower}
}
